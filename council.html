<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParishConnect | Council Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; background: #f1f5f9; } </style>
</head>
<body>
    <div id="login-view" class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
            <i data-lucide="users" class="text-blue-500 w-12 h-12 mx-auto mb-4"></i>
            <h1 class="text-2xl font-bold">Council Login</h1>
            <input id="council-code" type="password" placeholder="Council Passcode" class="w-full border rounded-lg p-3 my-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Access</button>
            <div id="error" class="text-red-600 text-sm mt-2 hidden"></div>
        </div>
    </div>

    <div id="dashboard" class="hidden flex h-screen">
        <aside class="w-64 bg-slate-900 text-white flex flex-col">
            <div class="p-6 border-b border-slate-700"><h1 class="text-xl font-bold">Council Panel</h1></div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="showSection('directory')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex gap-3"><i data-lucide="users"></i> Community</button>
                <button onclick="showSection('graves')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex gap-3"><i data-lucide="map-pin"></i> Graves</button>
                <button onclick="showSection('announcements')" class="w-full text-left p-3 rounded-lg hover:bg-slate-800 flex gap-3"><i data-lucide="megaphone"></i> Announcements</button>
            </nav>
            <div class="p-4 border-t"><button onclick="logout()" class="text-red-400 flex gap-2 w-full"><i data-lucide="log-out"></i> Logout</button></div>
        </aside>
        <main class="flex-1 overflow-y-auto p-6">
            <div id="section-directory" class="hidden"></div>
            <div id="section-graves" class="hidden"></div>
            <div id="section-announcements" class="hidden"></div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-2 rounded-lg hidden"></div>

    <script>
        const SHEETBEST_SHEET_ID = "1M4AxW0I4fycc5ChT0aoWnTiCKxOmW7i6L24cbQjTwDk";
        const API_KEY = "FxyhTS7Q6AXZ!%vPedRnjUb9p-1Jjv%oDkrJxXTnvBW_e0cuno5nn#gPyn1cM!Az";
        const API_BASE = `https://api.sheetbest.com/sheets/${SHEETBEST_SHEET_ID}`;

        let state = { data: { families:[], graves:[], announcements:[] }, community: null };

        async function fetchTab(tab) {
            const res = await fetch(`${API_BASE}?tab=${tab}`, { headers: { 'X-Api-Key': API_KEY } });
            if (!res.ok) throw new Error();
            return res.json();
        }

        async function loadData() {
            const [families, graves, announcements, passcodes] = await Promise.all([
                fetchTab('Families'), fetchTab('Graves'), fetchTab('Announcements'), fetchTab('Passcodes')
            ]);
            state.data.families = families.map(f=>({...f,id:Number(f.id)}));
            state.data.graves = graves.map(g=>({...g,familyId:Number(g.familyId)}));
            state.data.announcements = announcements.sort((a,b)=>new Date(b.date)-new Date(a.date));
            if(state.community) state.data.families = state.data.families.filter(f=>f.community===state.community);
        }

        async function login() {
            const code = document.getElementById('council-code').value.trim();
            if(!code) return;
            const passcodes = await fetchTab('Passcodes');
            const match = passcodes.find(p=>p.role==='council' && p.code===code);
            if(!match) { document.getElementById('error').innerText='Invalid code'; document.getElementById('error').classList.remove('hidden'); return; }
            state.community = match.community || null;
            await loadData();
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            showSection('directory');
            lucide.createIcons();
        }

        function logout() { location.reload(); }

        function showSection(section) {
            ['directory','graves','announcements'].forEach(s=>document.getElementById(`section-${s}`).classList.add('hidden'));
            document.getElementById(`section-${section}`).classList.remove('hidden');
            if(section==='directory') renderDirectory();
            if(section==='graves') renderGraves();
            if(section==='announcements') renderAnnouncements();
            lucide.createIcons();
        }

        function renderDirectory() {
            const container = document.getElementById('section-directory');
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">Community Families</h2><div class="grid md:grid-cols-2 gap-5">${state.data.families.map(f=>`<div class="bg-white p-5 rounded-2xl shadow"><h3 class="font-bold">${f.name}</h3><p class="text-sm text-slate-500">${f.cardNo}</p><p class="text-sm mt-2">${f.address}</p></div>`).join('')}</div>`;
        }

        function renderGraves() {
            const container = document.getElementById('section-graves');
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">Graveyard Records</h2><div class="grid md:grid-cols-3 gap-6">${state.data.graves.map(g=>{const f=state.data.families.find(f=>f.id===g.familyId);return `<div class="bg-white rounded-2xl shadow p-5"><p class="text-xs text-slate-500">Grave No.</p><p class="text-2xl font-black">${g.graveNo}</p><p class="mt-2">Family: ${f?.name||'Unknown'}</p></div>`}).join('')}</div>`;
        }

        function renderAnnouncements() {
            const typeColors = { General:'bg-blue-100 text-blue-800', Mass:'bg-purple-100 text-purple-800', Event:'bg-green-100 text-green-800', Urgent:'bg-red-100 text-red-800' };
            const container = document.getElementById('section-announcements');
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">📢 Parish Announcements</h2><div class="space-y-6">${state.data.announcements.map(a=>`<div class="bg-white rounded-2xl shadow border-l-8 ${a.type==='Urgent'?'border-red-500':'border-amber-400'} p-6"><div class="flex justify-between"><div><span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${typeColors[a.type]}">${a.type}</span><h3 class="text-xl font-bold mt-2">${escapeHtml(a.title)}</h3></div><div class="text-sm text-slate-400">${new Date(a.date).toLocaleString()}</div></div><p class="mt-3 text-slate-600">${escapeHtml(a.content)}</p><div class="mt-4 text-xs text-slate-400">Posted by ${a.createdBy||'Parish Office'}</div></div>`).join('')}</div>`;
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }

        window.login=login; window.logout=logout; window.showSection=showSection;
    </script>
</body>
</html>
