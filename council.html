<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParishConnect | Council</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="toast" class="toast hidden"></div>
    <script>
        const SPREADSHEET_ID = "1zP7AE3JXEyVw0RRPHdD9Pj-HTdxtswAHzQhkAttxIsQ";
        let accessToken = null;
        let state = { data: { families:[], graves:[], announcements:[] }, community: null };

        function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000); }

        async function getSheetData(sheet) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${sheet}?alt=json`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
            const data = await res.json();
            if (!data.values) return [];
            const headers = data.values[0];
            return data.values.slice(1).map(row => {
                let obj = {};
                headers.forEach((h,i) => obj[h] = row[i] || '');
                return obj;
            });
        }

        async function loadData() {
            const [families, graves, announcements] = await Promise.all([
                getSheetData('Families'), getSheetData('Graves'), getSheetData('Announcements')
            ]);
            state.data = { families, graves, announcements };
            if (state.community) state.data.families = families.filter(f => f.community === state.community);
        }

        async function init() {
            const token = sessionStorage.getItem('gapi_access_token');
            if (!token) { window.location.href = 'index.html'; return; }
            accessToken = token;
            try {
                await loadData();
                renderDashboard();
            } catch(e) { showToast('Auth error'); window.location.href = 'index.html'; }
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
                <div class="flex h-screen">
                    <aside class="w-64 bg-slate-900 text-white p-4">
                        <h1 class="text-xl font-bold">Council Panel</h1>
                        <nav class="mt-6 space-y-2">
                            <button onclick="showSection('directory')" class="w-full text-left p-2 rounded hover:bg-slate-800">Community</button>
                            <button onclick="showSection('graves')" class="w-full text-left p-2 rounded hover:bg-slate-800">Graves</button>
                            <button onclick="showSection('announcements')" class="w-full text-left p-2 rounded hover:bg-slate-800">Announcements</button>
                        </nav>
                        <button onclick="logout()" class="mt-8 text-red-400">Logout</button>
                    </aside>
                    <main class="flex-1 p-6 overflow-y-auto" id="main-content"></main>
                </div>
            `;
            showSection('directory');
            lucide.createIcons();
        }

        function showSection(section) {
            const container = document.getElementById('main-content');
            if (section === 'directory') renderDirectory(container);
            if (section === 'graves') renderGraves(container);
            if (section === 'announcements') renderAnnouncements(container);
        }

        function renderDirectory(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">Community Families</h2><div class="grid md:grid-cols-2 gap-5">${state.data.families.map(f => `<div class="bg-white p-5 rounded-2xl shadow"><h3 class="font-bold">${f.name}</h3><p>${f.cardNo}</p><p class="text-sm mt-2">${f.address}</p></div>`).join('')}</div>`;
        }

        function renderGraves(container) {
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">Graveyard Records</h2><div class="grid md:grid-cols-3 gap-6">${state.data.graves.map(g => { const f = state.data.families.find(f=>f.id===g.familyId); return `<div class="bg-white rounded-2xl shadow p-5"><p class="text-xs text-slate-500">Grave No.</p><p class="text-2xl font-black">${g.graveNo}</p><p>Family: ${f?.name||'Unknown'}</p></div>`; }).join('')}</div>`;
        }

        function renderAnnouncements(container) {
            const typeColors = { General:'bg-blue-100 text-blue-800', Mass:'bg-purple-100 text-purple-800', Event:'bg-green-100 text-green-800', Urgent:'bg-red-100 text-red-800' };
            container.innerHTML = `<h2 class="text-2xl font-bold mb-4">📢 Parish Announcements</h2><div class="space-y-6">${state.data.announcements.map(a=>`<div class="bg-white rounded-2xl shadow border-l-8 ${a.type==='Urgent'?'border-red-500':'border-amber-400'} p-6"><div class="flex justify-between"><div><span class="inline-block px-3 py-1 rounded-full text-xs font-bold ${typeColors[a.type]}">${a.type}</span><h3 class="text-xl font-bold mt-2">${escapeHtml(a.title)}</h3></div><div class="text-sm text-slate-400">${new Date(a.date).toLocaleString()}</div></div><p class="mt-3 text-slate-600">${escapeHtml(a.content)}</p><div class="mt-4 text-xs text-slate-400">Posted by ${a.createdBy||'Parish Office'}</div></div>`).join('')}</div>`;
        }

        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        window.showSection = showSection;
        window.logout = logout;
        init();
    </script>
</body>
</html>
