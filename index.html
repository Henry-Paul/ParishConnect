<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParishConnect | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .loader { display: inline-block; width: 20px; height: 20px; border: 2px solid #f3f3f3; border-top: 2px solid #f59e0b; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
            <i data-lucide="church" class="text-amber-400 w-12 h-12 mx-auto mb-4"></i>
            <h1 class="text-2xl font-bold">ParishConnect</h1>
            <p class="text-slate-500 mb-6">Church Management System</p>
            <div class="space-y-3">
                <button id="priestBtn" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="shield-check"></i> Parish Priest
                </button>
                <button id="councilBtn" class="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-900 font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="users"></i> Council Member
                </button>
                <button id="familyBtn" class="w-full py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="home"></i> Family Portal
                </button>
            </div>
            <div id="status" class="mt-4 text-sm text-slate-500"></div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "706990173660-1ar56n5c3hrvhlabkki9irkng65vpv2p.apps.googleusercontent.com";
        const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

        let auth2 = null;

        function initGoogleAuth() {
            gapi.load('auth2', function() {
                auth2 = gapi.auth2.init({
                    client_id: CLIENT_ID,
                    scope: SCOPES,
                    ux_mode: 'popup'
                });
            });
        }

        function authenticate(role) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Signing in to Google... <span class="loader"></span>';
            
            if (!auth2) {
                statusDiv.innerHTML = 'Loading Google Auth... Please refresh and try again.';
                return;
            }
            
            auth2.signIn().then(function(googleUser) {
                const token = googleUser.getAuthResponse().access_token;
                sessionStorage.setItem('gapi_access_token', token);
                sessionStorage.setItem('parishRole', role);
                statusDiv.innerHTML = 'Redirecting...';
                if (role === 'priest') window.location.href = 'priest.html';
                else if (role === 'council') window.location.href = 'council.html';
                else if (role === 'family') window.location.href = 'family.html';
            }).catch(function(error) {
                console.error(error);
                statusDiv.innerHTML = 'Login failed: ' + error.error;
            });
        }

        document.getElementById('priestBtn').onclick = () => authenticate('priest');
        document.getElementById('councilBtn').onclick = () => authenticate('council');
        document.getElementById('familyBtn').onclick = () => authenticate('family');

        initGoogleAuth();
        lucide.createIcons();
    </script>
</body>
</html>
