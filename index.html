<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParishConnect | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
            <i data-lucide="church" class="text-amber-400 w-12 h-12 mx-auto mb-4"></i>
            <h1 class="text-2xl font-bold">ParishConnect</h1>
            <p class="text-slate-500 mb-6">Church Management System</p>
            <div class="space-y-3">
                <button onclick="redirectWithRole('priest')" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="shield-check"></i> Parish Priest
                </button>
                <button onclick="redirectWithRole('council')" class="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-900 font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="users"></i> Council Member
                </button>
                <button onclick="redirectWithRole('family')" class="w-full py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-lg flex items-center justify-center gap-2">
                    <i data-lucide="home"></i> Family Portal
                </button>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "706990173660-1ar56n5c3hrvhlabkki9irkng65vpv2p.apps.googleusercontent.com";
        const SCOPES = "https://www.googleapis.com/auth/spreadsheets";

        function redirectWithRole(role) {
            sessionStorage.setItem('parishRole', role);
            
            // Build the full redirect URI using the current page's base path
            const currentPath = window.location.pathname; // e.g., "/ParishConnect/index.html"
            const baseDir = currentPath.substring(0, currentPath.lastIndexOf('/') + 1); // "/ParishConnect/"
            const redirectUri = window.location.origin + baseDir + role + '.html';
            
            console.log("Redirect URI:", redirectUri); // Check the console to verify
            
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=${SCOPES}&include_granted_scopes=true`;
            window.location.href = authUrl;
        }
    </script>
</body>
</html>
