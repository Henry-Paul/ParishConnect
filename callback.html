<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <p>Authenticating, please wait...</p>
    <script>
        // Extract access token from URL fragment
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        
        if (accessToken) {
            // Store token in sessionStorage
            sessionStorage.setItem('gapi_access_token', accessToken);
            // Get the role that was stored before OAuth
            const role = sessionStorage.getItem('parishRole');
            if (role === 'priest') window.location.href = 'priest.html';
            else if (role === 'council') window.location.href = 'council.html';
            else if (role === 'family') window.location.href = 'family.html';
            else window.location.href = 'index.html';
        } else {
            // No token – something went wrong
            alert('Authentication failed. Please try again.');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
